<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tracking Dashboard</title>
    
    <link rel="icon" href="/static/favicon.png" type="image/png">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">🚀 TrackX</div>

    <div class="nav-actions">
        <!-- search icon -->
        <svg class="icon" viewBox="0 0 24 24">
            <path d="M21 21l-4.3-4.3m1.3-5.2a7 7 0 11-14 0 7 7 0 0114 0z"
                stroke="currentColor" stroke-width="2" fill="none"/>
        </svg>

        <!-- sun icon -->
        <svg class="icon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2" fill="none"/>
        </svg>

        <!-- menu -->
        <svg class="icon" viewBox="0 0 24 24">
            <path d="M4 6h16M4 12h16M4 18h16"
                stroke="currentColor" stroke-width="2"/>
        </svg>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Tracking Dashboard</h1>
    <p>Theo dõi đơn hàng realtime</p>
</div>

<!-- MAIN -->
<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar glass">
        <h3>Orders</h3>

        <input id="code" placeholder="Tracking code">
        <input id="note" placeholder="Note">
        <button onclick="add()">Add</button>

        <div id="list"></div>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <div class="card glass">
            <h2 id="title">Select an order</h2>
        </div>

        <div id="detail" class="timeline"></div>
    </div>

</div>

<script src="/static/app.js"></script>
</body>
</html>
